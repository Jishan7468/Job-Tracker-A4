<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="shortcut icon"
      href="./images/briefcase-solid-full.svg"
      type="image/x-icon"
    />
    <!-- font connected -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome connected -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- daisy and tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      * {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#f8fafc] min-h-screen pb-10">
    <header class="p-10 w-[80%] mx-auto space-y-5">
      <h1 class="font-bold text-2xl">Job Application Tracker</h1>
      <section class="grid grid-cols-3 gap-3">
        <div class="bg-white p-4 rounded-[10px]">
          <p>Total</p>
          <h2 class="font-bold text-xl">0</h2>
        </div>
        <div class="bg-white p-4 rounded-[10px]">
          <p>Interview</p>
          <h2 class="font-bold text-xl text-green-400">0</h2>
        </div>
        <div class="bg-white p-4 rounded-[10px]">
          <p>Rejected</p>
          <h2 class="font-bold text-xl text-red-400">0</h2>
        </div>
      </section>
    </header>
    <main class="mx-auto w-[80%]">
        <section class="p-10 flex justify-between">
            <div class="space-y-5">
                <h1 class="text-xl font-bold">Available Jobs</h1>
                <div class="gap-3 flex">

                    <button class="btn px-10 bg-white">All</button>
                    <button class="btn px-10 bg-white">Interview</button>
                    <button class="btn px-10 bg-white">Rejected</button>
                </div>
            </div>
            <div>
                <h1>0 Jobs</h1>
            </div>
        </section>
        <!-- no jobs section -->
         <section  class="bg-white w-[93%] h-[250px] py-40 mx-auto rounded-2xl flex items-center justify-center">
            <div class="text-center space-y-2">
                <img src="./images/jobs.png" alt="" class="mx-auto">
                <p>No Jobs Available</p>
                <p>Check back soon for new Job opportunities</p>
            </div>
         </section>
    </main>

    <script src="./script/script.js"></script>
  </body>
</html>
